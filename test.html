<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réservation de salles</title>

  <style>
    body {
      font-family: Arial;
      font-size: 14px;
      background: #f5f5f5;
      color: #777;
    }

    .menu a {
      color: lightgray;
      margin-right: 10px;
    }

    .box {
      border: 1px solid #ddd;
      padding: 10px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
    }

    .modal-content {
      background: white;
      margin: 20% auto;
      padding: 20px;
      width: 200px;
    }
  </style>
</head>

<body>

<header>
  <h1>Réservation salles</h1>

  <div class="menu">
    <a href="#list">Salles</a>
    <a href="#form">Réserver</a>
  </div>
</header>

<main>

  <h2>Liste des salles</h2>

  <div class="box">
    Salle A - disponible
  </div>

  <div class="box">
    Salle B - occupée
  </div>

  <h2 id="form">Réserver une salle</h2>

  <form id="bookingForm">
    Nom :
    <input type="text" id="name">

    Salle :
    <input type="text" id="room">

    <button type="submit">Valider</button>
  </form>

  <div id="msg"></div>

</main>

<footer>
  <p>Copyright 2026</p>
</footer>

<!-- MODALE -->
<div class="modal" id="modal">
  <div class="modal-content">
    Réservation confirmée
    <button id="close">OK</button>
  </div>
</div>

<script>
  const form = document.getElementById("bookingForm");
  const modal = document.getElementById("modal");
  const close = document.getElementById("close");
  const msg = document.getElementById("msg");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    modal.style.display = "block";
    msg.innerText = "Réservation effectuée";
  });

  close.addEventListener("click", function() {
    modal.style.display = "none";
  });
</script>
</body>
</html>
